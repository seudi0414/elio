<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIO CLAN - 공식 가입 신청서</title>

    <!-- 카카오톡 미리보기 (오픈 그래프) 설정 -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://내-깃허브-주소.github.io/"> 
    <meta property="og:title" content="👑 ELIO CLAN - 공식 가입 신청서"> 
    <meta property="og:description" content="늘 즐거운, 엘리오 클랜의 일원이 되어주세요."> 
    <meta property="og:image" content="eliohf.jpg"> 

    <style>
        /* 기본 스타일 리셋 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
        }

        body {
            background-color: #fcfbfa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at center, #ffffff 0%, #f4f0e6 100%);
            overflow-x: hidden;
        }

        /* 🎬 인트로 화면 스타일 */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; 
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s ease;
        }

        #intro-overlay img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
            border-radius: 12px;
        }

        .skip-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #f1cc64 0%, #c6942b 100%);
            color: #fff;
            border: none;
            padding: 12px 26px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(198, 148, 43, 0.6);
            transition: all 0.3s ease;
            animation: pulse 2s infinite; /* 버튼 눈에 띄게 깜빡이는 효과 */
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(198, 148, 43, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(198, 148, 43, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(198, 148, 43, 0.6); }
        }

        #intro-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* 메인 컨테이너 */
        .container {
            width: 100%;
            max-width: 550px;
            background: #ffffff;
            border: 2px solid #eec55a; 
            border-radius: 16px;
            padding: 45px 35px;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.08), 0 0 25px rgba(238, 197, 90, 0.15);
            position: relative;
            opacity: 0; 
            transform: translateY(20px);
            transition: opacity 1.2s ease 0.3s, transform 1.2s ease 0.3s;
        }

        .container.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 헤더 영역 */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f1cc64 0%, #c6942b 50%, #f9df97 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: inline-block;
        }

        .header p {
            color: #8b7543;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        /* 6단계 프로그레스 바 */
        .progress-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 100%;
            height: 3px;
            background: #eae3d2;
            z-index: 1;
        }

        .progress-bar {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 3px;
            background: linear-gradient(90deg, #eec55a, #c6942b);
            z-index: 1;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-dot {
            width: 32px;
            height: 32px;
            background: #ffffff;
            border: 2px solid #eae3d2;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
            color: #bfa365;
            z-index: 2;
            transition: all 0.4s ease;
        }

        .step-dot.active {
            border-color: #c6942b;
            color: #ffffff;
            background: linear-gradient(135deg, #f1cc64 0%, #c6942b 100%);
            box-shadow: 0 0 12px rgba(198, 148, 43, 0.4);
        }

        /* 단계별 화면 제어 */
        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 입력 양식 스타일 */
        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #8b7543;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 15px 18px;
            background: #fdfcf9;
            border: 1px solid #dfd5be;
            border-radius: 8px;
            color: #333;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            outline: none;
            border-color: #c6942b;
            background: #ffffff;
            box-shadow: 0 0 8px rgba(198, 148, 43, 0.2);
        }

        .input-group textarea {
            resize: none;
            height: 130px;
        }

        /* 버튼 스타일 */
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 35px;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-next, .btn-submit, .btn-discord {
            background: linear-gradient(135deg, #f1cc64 0%, #c6942b 50%, #b2801b 100%);
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 4px 12px rgba(198, 148, 43, 0.25);
        }

        .btn-next:hover, .btn-submit:hover, .btn-discord:hover {
            background: linear-gradient(135deg, #fddb7d 0%, #d6a234 50%, #c6942b 100%);
            box-shadow: 0 6px 18px rgba(198, 148, 43, 0.4);
            transform: translateY(-1px);
        }

        .btn-prev {
            background: #f4f0e6;
            color: #7a6b48;
            border: 1px solid #dfd5be;
        }

        .btn-prev:hover {
            background: #eae3d2;
            color: #5c5033;
        }

        /* 디스코드 전용 스타일 */
        .btn-discord {
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%) !important;
            color: white !important;
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3) !important;
        }
        .btn-discord:hover {
            background: linear-gradient(135deg, #6A77F5 0%, #505DD6 100%) !important;
            box-shadow: 0 6px 18px rgba(88, 101, 242, 0.5) !important;
        }

        .notice-box {
            background: #faf7f0;
            border-left: 4px solid #c6942b;
            padding: 18px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
            border-radius: 0 8px 8px 0;
        }
        
        .notice-box strong {
            color: #c6942b;
        }

        .success-box {
            text-align: center;
            padding: 20px 0;
        }
        .success-box h2 {
            color: #c6942b;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .success-box p {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

<!-- 🎵 오디오 재생 태그 (반복 재생 설정) -->
<audio id="bgm" src="bgm.mp3" loop bgm.volume = 0.25;></audio>

<!-- 🎬 1. 인트로 오프닝 레이어 영역 -->
<div id="intro-overlay">
    <img src="elio.gif" alt="ELIO CLAN INTRO">
    <!-- 음악 시작을 위한 강렬한 입장 버튼 디자인 변경 -->
    <button class="skip-btn" onclick="skipIntro()">가입 신청하기(Skip)</button>
</div>

<div class="container" id="mainContainer">
    <div class="header">

        <p>엘리오 클랜 가입 신청서</p>
    </div>

    <!-- 6단계 상태 바 -->
    <div class="progress-container">

    <form id="applicationForm" onsubmit="sendToDiscord(event)">

        <div class="form-step active">
            <div class="notice-box">
                <strong>[ELIO 클랜 가입 안내]</strong><br>

            <div class="input-group">
                <label>주요 접속 시간대</label>
                <input type="text" id="gametime" placeholder="예: 평일 저녁 8시 ~ 새벽 1시 / 주말 풀접" required>

                <button type="button" class="btn btn-prev" onclick="prevStep(0)">이전 단계</button>

        <!-- STEP 3: 소통 및 클랜 인맥 구도 -->
        <div class="form-step">

                <input type="text" id="connection" placeholder="아는 클랜원의 닉네임을 적어주세요. 없으면 '무'" required>

            <div class="btn-container">

            <div class="input-group">
                <label>병영수첩 링크 첨부</label>

            </div>
        </div>

        <!-- STEP 5: 최종 한마디 및 제출 -->
        <div class="form-step">
            <div class="input-group">
                <label>가입 전 하고 싶은 말</label>
                <textarea id="final_message" placeholder="엘리오 클랜에 전하고 싶은 각오나 질문을 자유롭게 남겨주세요." required></textarea>

            <div class="btn-container">

                <button type="submit" class="btn btn-submit">최종 제출 및<br>디스코드 입장</button>

        <!-- STEP 6: 🎉 디스코드 채널 초대창 -->
        <div class="form-step">

                    엘리오 클랜 가입 신청서가 성공적으로 발송되었습니다.<br>
                    원활한 승인 가입 심사를 위해 아래 버튼을 눌러<br>
                    <strong>ELIO 공식 디스코드 채널</strong>에 꼭 입장해 주세요!

                <div class="btn-container">

                        ELIO 공식 디스코드 입장하기
                    </a>

<script>
    let introTimer;
    let isIntroCleared = false;

    // 🎬 인트로 종료 및 음악 재생 함수
    function skipIntro() {
        if (isIntroCleared) return;
        isIntroCleared = true;
        
        clearTimeout(introTimer);
        
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.2; // 🎚️ 볼륨은 기본 20%로 세팅해두었습니다.

        // 🎵 음악 재생 시도
        bgm.play().catch(error => {
            console.log("브라우저 정책으로 자동 재생이 차단되었습니다. 화면을 클릭하면 재생됩니다.");
            
            // 💡 만약 버튼을 안 눌러서 재생이 차단되었다면, 유저가 화면 아무데나 첫 클릭을 하는 순간 음악이 켜지도록 대기시킵니다.
            document.body.addEventListener('click', function startBgmOnFirstClick() {
                bgm.play();
                // 한 번 켜진 후에는 중복 실행되지 않도록 클릭 이벤트 제거
                document.body.removeEventListener('click', startBgmOnFirstClick); 
            }, { once: true });
        });

        const intro = document.getElementById('intro-overlay');
        const container = document.getElementById('mainContainer');
        intro.classList.add('fade-out');
        container.classList.add('show');
    }

    // ⏳ 7초 동안 버튼을 안 누르면 자동으로 인트로가 넘어가며 음악 재생을 시도합니다.
    window.addEventListener('DOMContentLoaded', () => {
        introTimer = setTimeout(skipIntro, 7000); 
    });

    // --- 아래는 기존 기능(페이지 제어 및 디스코드 전송)과 동일합니다 ---
    const formSteps = document.querySelectorAll(".form-step");
    const stepDots = document.querySelectorAll(".step-dot");
    const progressBar = document.getElementById("progress");

    function updateProgress(stepIndex) {
        progressBar.style.width = (stepIndex / (formSteps.length - 1)) * 100 + "%";
        stepDots.forEach((dot, idx) => {
            if (idx <= stepIndex) dot.classList.add("active");
            else dot.classList.remove("active");
        });
    }

    function nextStep(currentStepIndex) {
        const currentStep = formSteps[currentStepIndex - 1];
        const inputs = currentStep.querySelectorAll("input, select, textarea");
        let allValid = true;
        inputs.forEach(input => { if (!input.checkValidity()) { input.reportValidity(); allValid = false; } });
        if (!allValid) return;

        formSteps[currentStepIndex - 1].classList.remove("active");
        formSteps[currentStepIndex].classList.add("active");
        updateProgress(currentStepIndex);
    }

    function prevStep(targetStepIndex) {
        formSteps[targetStepIndex + 1].classList.remove("active");
        formSteps[targetStepIndex].classList.add("active");
        updateProgress(targetStepIndex);
    }

    function sendToDiscord(event) {
        event.preventDefault();

        const webhookUrl = "https://discord.com/api/webhooks/...";
        const discordInviteUrl = "https://discord.gg/여기서_클랜_초대링크_수정";
        document.getElementById("discordLink").href = discordInviteUrl;

        const username = document.getElementById("username").value;
        const userage = document.getElementById("userage").value;
        const usergender = document.getElementById("usergender").value;
        const mainweapon = document.getElementById("mainweapon").value;
        const gametime = document.getElementById("gametime").value;
        const mic = document.getElementById("mic").value;
        const connection = document.getElementById("connection").value;
        const leave_reason = document.getElementById("leave_reason").value;
        const barracks_link = document.getElementById("barracks_link").value;
        const final_message = document.getElementById("final_message").value;

        const requestData = {
            username: "ELIO 신청 알리미",
            embeds: [{
                title: "👑 ELIO 클랜 신규 가입 신청서",
                description: "웹사이트에서 작성된 실시간 신청서 레이아웃입니다.",
                color: parseInt("D4AF37", 16),
                timestamp: new Date().toISOString(),
                fields: [
                    { name: "👤 1단계: 기본 인적사항", value: `• **닉네임:** ${username}\n• **나이:** ${userage}세\n• **성별:** ${usergender}`, inline: false },
                    { name: "🎮 2단계: 게임 플레이 정보", value: `• **주총:** ${mainweapon}\n• **접속 시간대:** ${gametime}`, inline: false },
                    { name: "💬 3단계: 소통 및 인맥", value: `• **마이크 가능 여부:** ${mic}\n• **클랜 인맥:** ${connection}`, inline: false },
                    { name: "📋 4단계: 클랜 전적 및 인증", value: `• **전 클랜 탈퇴사유:** ${leave_reason}\n• **병영수첩:** [바로가기 링크](${barracks_link})`, inline: false },
                    { name: "📝 5단계: 가입 전 하고 싶은 말", value: `\`\`\`\n${final_message}\n\`\`\``, inline: false }
                ],
                footer: { text: "ELIO CLAN 공식 가입 신청 시스템" }
            }]
        };

        fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestData)
        })
        .then(response => {
            if (response.ok) {
                alert("신청서가 운영진에게 전송되었습니다!\n마지막 단계에서 디스코드 채널에 입장해 주세요.");
                formSteps[4].classList.remove("active");
                formSteps[5].classList.add("active");
                updateProgress(5);
            } else {
                alert("웹훅 주소 설정 오류 또는 디스코드 서버 전송 실패가 발생했습니다.");
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("네트워크 통신 오류가 발생했습니다.");
        });
    }
</script>
</body>
