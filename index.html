<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDREW CLAN - 가입 신청서</title>
    <!-- 부트스트랩 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 구글 폰트 (Pretendard 스타일의 깔끔한 폰트 적용) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 전체 배경 및 폰트 설정 (앤드류 특유의 깊은 블랙 톤) */
        body { 
            background-color: #0b0c10; 
            color: #c5c6c7; 
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        /* 메인 카드 디자인 (고급스러운 테두리와 그림자) */
        .clan-card { 
            background-color: #1f2833; 
            border: 1px solid #45f3ff; /* 네온 블루 포인트 선 */
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(69, 243, 255, 0.15);
        }

        /* 입력창 디자인 (다크모드 맞춤형) */
        .form-control, .form-select { 
            background-color: #0b0c10; 
            border: 1px solid #45fa9d33; 
            color: #fff; 
            padding: 12px;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus { 
            background-color: #121212; 
            color: #fff; 
            border-color: #45f3ff; 
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.3); 
        }

        /* 버튼 디자인 */
        .btn-next { background: linear-gradient(45deg, #45f3ff, #1f2833); border: none; color: #000; font-weight: bold; }
        .btn-next:hover { background: #45f3ff; color: #000; box-shadow: 0 0 15px rgba(69, 243, 255, 0.5); }
        .btn-prev { background-color: #2a3543; border: none; color: #fff; }
        .btn-prev:hover { background-color: #3d4d61; color: #fff; }
        .btn-submit { background: linear-gradient(45deg, #00ff87, #60efff); border: none; color: #000; font-weight: bold; }
        .btn-submit:hover { box-shadow: 0 0 15px rgba(0, 255, 135, 0.6); }

        /* 단계별 인디케이터 (동그라미 숫자 바) */
        .step-container { display: flex; justify-content: space-between; position: relative; margin-bottom: 40px; }
        .step-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background-color: #2a3543; z-index: 1; transform: translateY(-50%); }
        .step-circle { width: 40px; height: 40px; border-radius: 50%; background-color: #1f2833; border: 2px solid #2a3543; display: flex; align-items: center; justify-content: center; z-index: 2; font-weight: bold; color: #666; transition: all 0.3s ease; }
        .step-circle.active { border-color: #45f3ff; color: #45f3ff; background-color: #0b0c10; box-shadow: 0 0 10px rgba(69, 243, 255, 0.5); }
        .step-circle.complete { border-color: #00ff87; color: #00ff87; background-color: #1f2833; }

        /* 단계 전환 애니메이션 */
        .form-step { display: none; animation: fadeIn 0.5s ease-in-out forwards; }
        .form-step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container my-5" style="max-width: 550px;">
    
    <!-- 앤드류 클랜 헤더 타이틀 -->
    <div class="text-center mb-5">
        <h1 class="fw-bold tracking-widest text-white" style="letter-spacing: 3px;">A N D R E W</h1>
        <p style="color: #45f3ff; font-size: 0.9rem; font-weight: 300;">CLAN ONLINE APPLICATION SYSTEM</p>
    </div>

    <!-- 진행 단계 인디케이터 상단 바 -->
    <div class="step-container">
        <div class="step-line"></div>
        <div class="step-circle active" id="circle-1">1</div>
        <div class="step-circle" id="circle-2">2</div>
        <div class="step-circle" id="circle-3">3</div>
    </div>

    <!-- 메인 카드 폼 영역 -->
    <div class="card clan-card p-4 p-md-5">
        <form action="submit_application.php" method="POST" id="andrewForm">
            
            <!-- [1단계: 인적 사항] -->
            <div class="form-step active" id="step-1">
                <h4 class="text-white mb-4 fw-bold">STEP 01. 인적 사항</h4>
                <div class="mb-4">
                    <label class="form-label text-light small fw-bold">이름 및 성별</label>
                    <input type="text" name="username" class="form-control" placeholder="예: 홍길동 / 남" id="name" autocomplete="off">
                </div>
                <div class="mb-4">
                    <label class="form-label text-light small fw-bold">현재 나이</label>
                    <input type="number" name="age" class="form-control" placeholder="본인의 실제 나이를 입력하세요" id="age">
                </div>
                <div class="text-end mt-5">
                    <button type="button" class="btn btn-next px-4 py-2" onclick="goStep(2)">다음 단계 ➔</button>
                </div>
            </div>

            <!-- [2단계: 게임 정보] -->
            <div class="form-step" id="step-2">
                <h4 class="text-white mb-4 fw-bold">STEP 02. 게임 정보</h4>
                <div class="mb-4">
                    <label class="form-label text-light small fw-bold">정확한 게임 닉네임</label>
                    <input type="text" name="game_id" class="form-control" placeholder="대소문자 및 특수문자 정확히 기재" id="game_id" autocomplete="off">
                </div>
                <div class="mb-4">
                    <label class="form-label text-light small fw-bold">하루 평균 접속 시간 및 시간대</label>
                    <input type="text" name="play_time" class="form-control" placeholder="예: 평일 저녁 7시 ~ 11시 / 주말 상시">
                </div>
                <div class="mb-4">
                    <label class="form-label text-light small fw-bold">디스코드 활성화 및 마이크 사용 여부</label>
                    <select name="discord_check" class="form-select">
                        <option value="가능">디스코드 및 마이크 상시 가능</option>
                        <option value="듣기만">듣기만 가능 (마이크 불가능)</option>
                        <option value="불가능">참여 불가</option>
                    </select>
                </div>
                <div class="d-flex justify-content-between mt-5">
                    <button type="button" class="btn btn-prev px-4 py-2" onclick="goStep(1)">이전으로</button>
                    <button type="button" class="btn btn-next px-4 py-2" onclick="goStep(3)">다음 단계 ➔</button>
                </div>
            </div>

            <!-- [3단계: 소개 및 각오] -->
            <div class="form-step" id="step-3">
                <h4 class="text-white mb-4 fw-bold">STEP 03. 지원 동기 및 각오</h4>
                <div class="mb-4">
                    <label class="form-label text-light small fw-bold">자기소개 및 각오 (성의 있게 작성)</label>
                    <textarea name="introduction" class="form-control" rows="6" placeholder="클랜 규정을 준수하고 매너 플레이를 약속하는 내용을 포함하여 자유롭게 작성해주세요." id="intro"></textarea>
                </div>
                <div class="alert alert-dark bg-dark border-0 text-muted small mb-4">
                    ⚠️ 허위 사실 기재 시 경고 없이 가입 신청이 무효 처리되거나 클랜에서 추방될 수 있습니다.
                </div>
                <div class="d-flex justify-content-between mt-5">
                    <button type="button" class="btn btn-prev px-4 py-2" onclick="goStep(2)">이전으로</button>
                    <button type="submit" class="btn btn-submit px-5 py-2">가입 신청 완료</button>
                </div>
            </div>

        </form>
    </div>
</div>

<!-- 부드러운 화면 전환을 위한 자바스크립트 스크립트 -->
<script>
    function goStep(currentStep) {
        // [간단한 입력 검증] 빈칸 방지
        if (currentStep === 2) {
            if (!document.getElementById('name').value || !document.getElementById('age').value) {
                alert('인적 사항을 모두 정확히 입력해 주세요.');
                return;
            }
        }
        if (currentStep === 3) {
            if (!document.getElementById('game_id').value) {
                alert('게임 닉네임을 입력해 주세요.');
                return;
            }
        }

        // 1. 모든 스텝 화면 숨기고 해당 스텝만 활성화
        document.querySelectorAll('.form-step').forEach(step => step.classList.remove('active'));
        document.getElementById('step-' + currentStep).classList.add('active');

        // 2. 상단 동그라미 번호 상태 업데이트
        document.querySelectorAll('.step-circle').forEach((circle, index) => {
            const stepNum = index + 1;
            circle.classList.remove('active', 'complete');
            
            if (stepNum === currentStep) {
                circle.classList.add('active');
            } else if (stepNum < currentStep) {
                circle.classList.add('complete');
            }
        });
    }
</script>

</body>
</html>
