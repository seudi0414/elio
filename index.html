<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>클랜 홈페이지</title>

<style>

body{
background:#f5f5f5;
font-family:sans-serif;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.title{
font-size:30px;
font-weight:bold;
text-align:center;
}

.check{
font-size:18px;
margin:10px 0;
}

.button{
display:block;
text-align:center;
padding:15px;
background:#4CAF50;
color:white;
text-decoration:none;
border-radius:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<div class="title">
elio
</div>
<img src="클랜마크640.png" alt="ELIO Logo" width="250">
<p style="text-align:center;">
언제나 즐거운 클랜
</p>

</div>

<div class="card">

<h2>가입 조건</h2>

<div class="check">🔅 30살 이상</div>
<div class="check">🔅 에보렙 450 이상</div>
<div class="check">🔅 K/D 65% 이하</div>
<div class="check">🔅 철새 X</div>

</div>

<div class="card">

<h2>가입 신청</h2>

<a class="button" href="#">
가입 문의하기
</a>

</div>

</body>
</html>
